# One-shot grid sweep for Qwen3-30B-A3B on 4 GPUs.
#
# Design:
#   - 4 parallelism strategies per backend x 3 scheduler capacity points = 12 candidates per backend
#   - 24 workload cells: input_len x output_len x max_concurrency
#   - repeats=1: single shot. Re-run noisy candidates separately if needed.
#   - Objective: goodput_at_slo (throughput conditional on meeting p99 TTFT/TPOT SLOs)
#
# Sweep size: 24 candidates x 24 workloads x 1 repeat = 576 cells. ~30h wall-clock at 3min/cell.
# concurrencies span [1, 4, 16, 64] so the operating-curve plot traces a real curve from
# low-load (best latency) to near-saturation (best throughput). The (input_len=16384, conc=64)
# corners are likely to OOM on memory-tight candidates (esp. tp1dp4ep which replicates the
# full model 4x) - that's intentional signal, surfaced in the failure summary.
# Both backends share the run_id; the runner script serializes them between GPU resets.

experiment:
  name: qwen3-a3b-4gpu-grid
  run_id: qwen3-a3b-4gpu-grid
  model: Qwen/Qwen3-30B-A3B
  gpus: 4
  dtype: bfloat16
  host: 127.0.0.1

execution:
  repeats: 1
  resume: true
  fail_fast: false
  server_ready_timeout_sec: 1200
  bench_timeout_sec: 2400
  cool_down_sec: 10

backends:
  vllm:
    enabled: true
    python: .backends/vllm/bin/python
    port: 19100
    served_model_name: moe-bench-qwen3-a3b
  sglang:
    enabled: true
    python: .backends/sglang/bin/python
    port: 19101

# Naming convention: <backend>_<parallelism>_<scheduler>
#   parallelism: tp4 / tp4ep / tp2dp2ep / tp1dp4ep / dpattn (SGLang only)
#   scheduler:   s<max_seqs>_bt<max_batched_tokens>   (vLLM)
#                req<max_running_reqs>_chunk<chunked_prefill>  (SGLang)
serve_configs:
  # ----------------------------- vLLM (12) -----------------------------
  # TP-only baseline x 3 scheduler points
  - name: vllm_tp4_s64_bt4096
    vllm: &vllm_tp4_base
      tensor_parallel_size: 4
      data_parallel_size: 1
      enable_expert_parallel: false
      dtype: bfloat16
      moe_backend: auto
      gpu_memory_utilization: 0.90
      enable_prefix_caching: false
      max_num_seqs: 64
      max_num_batched_tokens: 4096
  - name: vllm_tp4_s128_bt8192
    vllm:
      <<: *vllm_tp4_base
      max_num_seqs: 128
      max_num_batched_tokens: 8192
  - name: vllm_tp4_s256_bt16384
    vllm:
      <<: *vllm_tp4_base
      max_num_seqs: 256
      max_num_batched_tokens: 16384

  # TP + EP x 3 scheduler points
  - name: vllm_tp4ep_s64_bt4096
    vllm: &vllm_tp4ep_base
      tensor_parallel_size: 4
      data_parallel_size: 1
      enable_expert_parallel: true
      enable_ep_weight_filter: true
      dtype: bfloat16
      moe_backend: auto
      all2all_backend: allgather_reducescatter
      expert_placement_strategy: linear
      gpu_memory_utilization: 0.90
      enable_prefix_caching: false
      max_num_seqs: 64
      max_num_batched_tokens: 4096
  - name: vllm_tp4ep_s128_bt8192
    vllm:
      <<: *vllm_tp4ep_base
      max_num_seqs: 128
      max_num_batched_tokens: 8192
  - name: vllm_tp4ep_s256_bt16384
    vllm:
      <<: *vllm_tp4ep_base
      max_num_seqs: 256
      max_num_batched_tokens: 16384

  # TP2 x DP2 + EP x 3 scheduler points
  - name: vllm_tp2dp2ep_s64_bt4096
    vllm: &vllm_tp2dp2ep_base
      tensor_parallel_size: 2
      data_parallel_size: 2
      enable_expert_parallel: true
      enable_ep_weight_filter: true
      dtype: bfloat16
      moe_backend: auto
      all2all_backend: allgather_reducescatter
      expert_placement_strategy: linear
      gpu_memory_utilization: 0.90
      enable_prefix_caching: false
      max_num_seqs: 64
      max_num_batched_tokens: 4096
  - name: vllm_tp2dp2ep_s128_bt8192
    vllm:
      <<: *vllm_tp2dp2ep_base
      max_num_seqs: 128
      max_num_batched_tokens: 8192
  - name: vllm_tp2dp2ep_s256_bt16384
    vllm:
      <<: *vllm_tp2dp2ep_base
      max_num_seqs: 256
      max_num_batched_tokens: 16384

  # Pure DP + EP x 3 scheduler points
  - name: vllm_tp1dp4ep_s64_bt4096
    vllm: &vllm_tp1dp4ep_base
      tensor_parallel_size: 1
      data_parallel_size: 4
      enable_expert_parallel: true
      enable_ep_weight_filter: true
      dtype: bfloat16
      moe_backend: auto
      all2all_backend: allgather_reducescatter
      expert_placement_strategy: linear
      gpu_memory_utilization: 0.90
      enable_prefix_caching: false
      max_num_seqs: 64
      max_num_batched_tokens: 4096
  - name: vllm_tp1dp4ep_s128_bt8192
    vllm:
      <<: *vllm_tp1dp4ep_base
      max_num_seqs: 128
      max_num_batched_tokens: 8192
  - name: vllm_tp1dp4ep_s256_bt16384
    vllm:
      <<: *vllm_tp1dp4ep_base
      max_num_seqs: 256
      max_num_batched_tokens: 16384

  # ----------------------------- SGLang (12) -----------------------------
  # TP-only baseline x 3 scheduler points
  - name: sglang_tp4_req64_chunk4096
    sglang: &sglang_tp4_base
      tp: 4
      dtype: bfloat16
      context_length: 16384
      mem_fraction_static: 0.90
      attention_backend: flashinfer
      disable_radix_cache: true
      max_running_requests: 64
      chunked_prefill_size: 4096
  - name: sglang_tp4_req128_chunk8192
    sglang:
      <<: *sglang_tp4_base
      max_running_requests: 128
      chunked_prefill_size: 8192
  - name: sglang_tp4_req256_chunk16384
    sglang:
      <<: *sglang_tp4_base
      max_running_requests: 256
      chunked_prefill_size: 16384

  # TP + EP x 3 scheduler points
  - name: sglang_tp4ep_req64_chunk4096
    sglang: &sglang_tp4ep_base
      tp: 4
      ep: 4
      dtype: bfloat16
      context_length: 16384
      mem_fraction_static: 0.90
      attention_backend: flashinfer
      moe_runner_backend: auto
      moe_a2a_backend: none
      disable_radix_cache: true
      max_running_requests: 64
      chunked_prefill_size: 4096
  - name: sglang_tp4ep_req128_chunk8192
    sglang:
      <<: *sglang_tp4ep_base
      max_running_requests: 128
      chunked_prefill_size: 8192
  - name: sglang_tp4ep_req256_chunk16384
    sglang:
      <<: *sglang_tp4ep_base
      max_running_requests: 256
      chunked_prefill_size: 16384

  # DP-attention + EP x 3 scheduler points (SGLang-specific knob)
  - name: sglang_tp4dpattn_ep_req64_chunk4096
    sglang: &sglang_tp4dpattn_base
      tp: 4
      dp: 4
      enable_dp_attention: true
      ep: 4
      dtype: bfloat16
      context_length: 16384
      mem_fraction_static: 0.90
      attention_backend: triton
      moe_runner_backend: auto
      moe_a2a_backend: none
      disable_radix_cache: true
      max_running_requests: 64
      chunked_prefill_size: 4096
  - name: sglang_tp4dpattn_ep_req128_chunk8192
    sglang:
      <<: *sglang_tp4dpattn_base
      max_running_requests: 128
      chunked_prefill_size: 8192
  - name: sglang_tp4dpattn_ep_req256_chunk16384
    sglang:
      <<: *sglang_tp4dpattn_base
      max_running_requests: 256
      chunked_prefill_size: 16384

  # TP2 x DP2 + EP x 3 scheduler points (mixed parallelism)
  - name: sglang_tp2dp2ep_req64_chunk4096
    sglang: &sglang_tp2dp2ep_base
      tp: 2
      dp: 2
      enable_dp_attention: true
      ep: 4
      dtype: bfloat16
      context_length: 16384
      mem_fraction_static: 0.90
      attention_backend: triton
      moe_runner_backend: auto
      moe_a2a_backend: none
      disable_radix_cache: true
      max_running_requests: 64
      chunked_prefill_size: 4096
  - name: sglang_tp2dp2ep_req128_chunk8192
    sglang:
      <<: *sglang_tp2dp2ep_base
      max_running_requests: 128
      chunked_prefill_size: 8192
  - name: sglang_tp2dp2ep_req256_chunk16384
    sglang:
      <<: *sglang_tp2dp2ep_base
      max_running_requests: 256
      chunked_prefill_size: 16384

workloads:
  input_lens: [256, 4096, 16384]
  output_lens: [128, 1024]
  concurrencies: [1, 4, 16, 64]
  num_prompts: 128
  num_warmups: 16
  seeds: [0]
  random_range_ratio: "0.0"

# Goodput-at-SLO: rank by output_tok_s_per_gpu conditional on meeting both p99 SLOs.
# Candidates that violate either SLO get goodput_at_slo = 0 instead of being filtered out.
objective:
  maximize: goodput_at_slo
  constraints:
    p99_ttft_ms: 2000
    p99_tpot_ms: 100

report:
  legend_params:
    - tensor_parallel_size
    - data_parallel_size
    - enable_expert_parallel
    - max_num_seqs
    - max_num_batched_tokens
    - tp
    - dp
    - ep
    - enable_dp_attention
    - attention_backend
    - max_running_requests
    - chunked_prefill_size
